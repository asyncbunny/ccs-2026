syntax = "proto3";
package anon.btclightclient.v1;

import "gogoproto/gogo.proto";
import "anon/btclightclient/v1/btclightclient.proto";
import "anon/btclightclient/v1/params.proto";

option go_package = "github.com/anon-org/anon/v4/x/btclightclient/types";

// GenesisState defines the btclightclient module's genesis state.
message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  repeated BTCHeaderInfo btc_headers = 2;
}
